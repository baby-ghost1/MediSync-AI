version: "3.9"

services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    container_name: medisync-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: medisync_ai
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    container_name: medisync-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      CLIENT_URL: http://localhost:80
      MONGODB_URI: mongodb://medisync-mongodb:27017/medisync_ai
      JWT_SECRET: ${JWT_SECRET:-change_this_to_a_long_random_secret}
      JWT_EXPIRES_IN: 7d
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-another_long_random_secret}
      REFRESH_TOKEN_EXPIRES_IN: 30d
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: unless-stopped
    container_name: medisync-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
